<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DiaClinic | Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>

<div class="container-fluid login_container">
    <div class="row h-100">

        <div class="col-md-6 d-none d-md-block login_imagen_lateral">
            <img src="assets/fondo_login.png" alt="Fondo DiaClinic" class="img-fluid fondo_img">
        </div>

        <div class="col-md-6 col-12 login_contenido">
            <div class="login_wrapper text-center">

                <div class="login_logo mx-auto d-block">
                    <img src="assets/logo_circular.png" alt="Logo DiaClinic" class="logo_img">
                    <p>DiaClinic</p>
                </div>

                <h1 class="login_titulo">Toma el control</h1>
                <h1 class="login_subtitulo">de tu salud.</h1>

                <p>
                    <span class="login_texto_azul"><strong>Detecta la diabetes</strong></span> a tiempo
                </p>

                <div class="login_acciones mt-4">
                    <a href="./views/pantalla_login.html" class="login_btn_inicio text-center text-decoration-none">
                        Iniciar sesión
                    </a>
                    <a href="./views/pantalla_registro.html" class="login_btn_registro text-center text-decoration-none mt-3 d-inline-block">
                        Registrarse
                    </a>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
