<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiaClinic - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/pantalla home.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white navbar_dashboard">
        <div class="container-fluid p-0">
            <a class="navbar-brand navbar_brand_logo" href="#">
                <img src="../assets/logo_circular.png" alt="Logo DiaClinic">
                <span>DiaClinic</span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <div class="navbar-nav navbar_menu_links text-center">
                    <a class="nav-link" href="#">Servicios</a>
                    <a class="nav-link" href="#">Sobre diabetes</a>
                    <a class="nav-link" href="#">Vida con diabetes</a>
                    <a class="nav-link" href="#">Laboratorios</a>
                </div>
                <div class="d-lg-none mt-3 user_profile_header justify-content-center">
                    <span>iniciar sesión</span>
                </div>
            </div>

            <div class="user_profile_header d-none d-lg-flex">
                <span style="cursor: pointer; font-weight: 500;">iniciar sesión</span>
            </div>
        </div>
    </nav>

    <section class="hero_section_container d-flex align-items-center">
        <div class="container-fluid p-0">
            <div class="row align-items-center g-0">
                <div class="col-lg-6 hero_content_left">
                    <h1 class="hero_title_text">
                        Cuidamos tu salud,<br>
                        controlamos la diabetes contigo
                    </h1>
                    <p class="hero_description">
                        Información clara, seguimiento médico y apoyo
                        para <strong>una vida saludable</strong>
                    </p>
                    <button class="btn_action_green shadow-sm">
                        Pide tu consulta
                    </button>
                </div>
                <div class="col-lg-6 hero_image_right">
                    <img src="../assets/doctor.png" alt="Doctor Diaclinic" class="img-fluid">
                </div>
            </div>
        </div>
    </section>

    <footer class="footer_bar_container">
        <div class="container-fluid p-0 d-flex flex-column flex-md-row justify-content-between align-items-center">
            <p class="mb-0">© 2026 DiaClinic</p>
            <div class="footer_links mt-3 mt-md-0">
                <a href="#">Sobre nosotros</a>
                <a href="#">Avisos de privacidad</a>
                <a href="#">Contactos</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
