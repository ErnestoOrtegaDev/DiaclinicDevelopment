<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Laboratorios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/laboratorios.css">
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        
        <div class="col-12 d-lg-none bg-white p-3 d-flex justify-content-between align-items-center border-bottom">
            <div class="logo-mobile d-flex align-items-center">
                <img src="../assets/logo.png" style="width: 40px;" alt="Logo">
                <span class="fw-bold ms-2">DiaClinic</span>
            </div>
            <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                Menu ☰
            </button>
        </div>

        <aside class="col-lg-auto d-none d-lg-flex flex-column sidebar">
            <div class="logo">
                <img src="../assets/logo.png" class="logo_img" alt="Logo">
                <p class="fw-bold mt-2">DiaClinic</p>
            </div>
            <nav class="menu nav flex-column">
                <div class="menu_item nav-link">Pacientes</div>
                <div class="menu_item nav-link">Consultas</div>
                <div class="menu_item nav-link">Servicios</div>
                <div class="menu_item nav-link active">Laboratorios</div>
            </nav>
        </aside>

        <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMenu">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title fw-bold">DiaClinic</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <nav class="menu nav flex-column">
                    <div class="menu_item nav-link">Pacientes</div>
                    <div class="menu_item nav-link">Consultas</div>
                    <div class="menu_item nav-link">Servicios</div>
                    <div class="menu_item nav-link active">Laboratorios</div>
                </nav>
            </div>
        </div>

        <main class="col main_content">
            <div class="card_form shadow-sm">
                <h1>Solicitar Laboratorios</h1>

                <div class="row g-4">
                    <div class="col-12 col-xl-6">
                        <label class="form-label fw-bold">Nombre</label>
                        <input type="text" class="gray_input" placeholder="Ingrese su nombre">

                        <label class="form-label fw-bold">Apellido Paterno</label>
                        <input type="text" class="gray_input" placeholder="Ingrese su apellido paterno">

                        <label class="form-label fw-bold">Apellido Materno</label>
                        <input type="text" class="gray_input" placeholder="Ingrese su apellido materno">

                        <label class="form-label fw-bold">Clínica de Recolección</label>
                        <select class="dropdown_select_clinic">
                            <option>Seleccione su clínica...</option>
                        </select>
                    </div>

                    <div class="col-12 col-xl-6">
                        <label class="form-label fw-bold">Laboratorios</label>

                        <div class="lab_selection_wrapper">
                            <div class="lab_options_scroll_list">
                                <div class="lab_list_item" onclick="toggleLabSelection(this)">Perfil Hepático</div>
                                <div class="lab_list_item" onclick="toggleLabSelection(this)">Glucosa</div>
                                <div class="lab_list_item" onclick="toggleLabSelection(this)">Hemogramas</div>
                                <div class="lab_list_item" onclick="toggleLabSelection(this)">Hematología</div>
                                <div class="lab_list_item" onclick="toggleLabSelection(this)">Perfil Tiroideo</div>
                                <div class="lab_list_item" onclick="toggleLabSelection(this)">Inmunología</div>
                            </div>
                        </div>

                        <div class="buttons_container row g-2 mt-4">
                            <div class="col-12 col-sm-6">
                                <button class="btn_primary w-100" onclick="submitLabRequest()">Enviar Solicitud</button>
                            </div>
                            <div class="col-12 col-sm-6">
                                <button class="btn_secondary w-100" onclick="cancelRequest()">Cancelar Solicitud</button>
                            </div>
                        </div>
                    </div>
                </div> </div>
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="laboratorios.js"></script>
</body>
</html>
