<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiaClinic | Asignación Alimenticia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/asignacion alimenticia.css">
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        
        <header class="col-12 d-lg-none bg-white p-3 d-flex justify-content-between align-items-center border-bottom sticky-top">
            <div class="d-flex align-items-center gap-2">
                <img src="../assets/logo.png" width="40" alt="Logo">
                <span class="fw-bold">DiaClinic Doctor</span>
            </div>
            <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarAlimentos">
            </button>
        </header>

        <aside class="col-lg-auto d-none d-lg-flex flex-column sidebar">
            <div class="logo_section">
                <img src="../assets/logo.png" class="logo_img" alt="Logo">
                <h2 class="logo_text">
                    DiaClinic<br>
                    <span>Doctor</span>
                </h2>
            </div>

            <nav class="menu nav flex-column">
                <a class="menu_item nav-link">Pacientes</a>
                <a class="menu_item nav-link">Consultas</a>
                <a class="menu_item nav-link">Servicios</a>
                <a class="menu_item nav-link active">Alimentación</a>
            </nav>

            <div class="user_box mt-auto">
                <div class="settings mb-2">⚙ Settings</div>
                <div class="user_profile">
                    <span class="fw-bold">Dr. Ernesto Ortega</span>
                </div>
            </div>
        </aside>

        <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarAlimentos">
            <div class="offcanvas-header border-bottom">
                <h5 class="offcanvas-title fw-bold">DiaClinic Doctor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body d-flex flex-column">
                <nav class="menu nav flex-column">
                    <a class="menu_item nav-link">Pacientes</a>
                    <a class="menu_item nav-link">Consultas</a>
                    <a class="menu_item nav-link">Servicios</a>
                    <a class="menu_item nav-link active">Alimentación</a>
                </nav>
            </div>
        </div>

        <main class="col main_content">
            <div class="content_card shadow">
                <h1 class="page_title">Asignación Alimenticia</h1>

                <div class="row g-4 mt-2">
                    <div class="col-12 col-xl-6">
                        <div class="form_group">
                            <label>Alimentos Recomendados:</label>
                            <textarea class="form-control border-0" placeholder="Enliste los alimentos recomendados..."></textarea>
                        </div>
                    </div>

                    <div class="col-12 col-xl-6">
                        <div class="form_group">
                            <label>Alimentos a Evitar:</label>
                            <textarea class="form-control border-0" placeholder="Enliste los alimentos a evitar..."></textarea>
                        </div>
                    </div>

                    <div class="col-12 col-xl-6">
                        <div class="form_group">
                            <label>Recomendaciones Especiales:</label>
                            <textarea class="form-control border-0" placeholder="Enliste las recomendaciones especiales..."></textarea>
                        </div>
                    </div>

                    <div class="col-12 col-xl-6">
                        <div class="form_group">
                            <label>Reglas Prácticas:</label>
                            <textarea class="form-control border-0" placeholder="Enliste las reglas prácticas..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="button_container d-flex justify-content-center justify-content-md-end gap-3 mt-5">
                    <button class="btn_danger px-4 py-2">Cancelar</button>
                    <button class="btn_primary px-4 py-2">Asignar Alimentación</button>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
