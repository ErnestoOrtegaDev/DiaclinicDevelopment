<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiaClinic | Inicio de Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/pantalla_login.css">
</head>
<body class="login_container p-3">

    <div class="login_logo">
        <img src="../assets/logo.png" class="logo_img shadow-sm" alt="Logo">
        <p class="m-0">DiaClinic</p>
    </div>

    <div class="auth_card shadow-lg">

        <div class="auth_tabs">
            <button type="button" class="auth_tab_activo">Iniciar Sesión</button>
            <button type="button" class="auth_tab" onclick="window.location.href='pantalla_registro.html'">Registrarse</button>
        </div>

        <form action="../controllers/login.php" method="POST">
            
            <span id="mensaje_sistema" class="text-center d-block mb-3 fw-bold" style="display: none !important;"></span>

            <div class="mb-3">
                <label class="auth_label">Correo electrónico</label>
                <div class="auth_input_group">
                    <input type="email" class="auth_input" name="email" placeholder="ejemplojuan@correo.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="auth_label">Contraseña</label>
                <div class="auth_input_group">
                    <input type="password" class="auth_input" name="password" placeholder="**********" required>
                </div>
            </div>

            <button type="submit" class="auth_btn_principal shadow-sm">
                Iniciar sesión
            </button>

            <div class="separador my-3">
                <span>o</span>
            </div>

            <button type="button" class="auth_btn_secundario mb-3">
                Continuar con Google
            </button>

            <div class="text-center mt-3">
                <a href="#" class="login_texto_azul text-decoration-none">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
    </div>

    <div class="text-center mt-4">
        <small class="text-muted">DiaClinic © 2026</small>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mensajeSpan = document.getElementById('mensaje_sistema');

        if (urlParams.has('error')) {
            mensajeSpan.style.setProperty('display', 'block', 'important');
            mensajeSpan.classList.add('text-danger'); // Texto rojo
            
            if (urlParams.get('error') === 'pass') {
                mensajeSpan.textContent = 'Contraseña o Correo incorrectos.';
            } 
        } else if (urlParams.get('registro') === 'exito') {
            mensajeSpan.style.setProperty('display', 'block', 'important');
            mensajeSpan.classList.add('text-success'); // Texto verde
            mensajeSpan.textContent = '¡Cuenta creada con éxito! Ahora inicia sesión.';
        }
    </script>
</body>
</html>
